# cargo-deny configuration — https://embarkstudios.github.io/cargo-deny/
# Run locally with `cargo deny check` (or `just audit`). Enforced in CI (`deny` job).

[graph]
# Only check the targets we actually ship / build on.
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-unknown-linux-gnu" },
]
all-features = true

[output]
feature-depth = 1

# ---------------------------------------------------------------------------
# Security advisories (RustSec) — fail the build on known vulnerabilities.
# ---------------------------------------------------------------------------
[advisories]
db-path = "$CARGO_HOME/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
version = 2
yanked = "deny"
# Consciously-accepted advisories. Each is transitive and/or build-time-only, with no
# runtime attack surface in these services, and either has no fixed release or no fix that a
# leaf crate can pull. Reviewed and accepted rather than silently suppressed.
ignore = [
    # `rsa` has no released fix. Used only server-side by `identity` to mint the RS256 JWT
    # signing key; an attacker cannot observe its private-key timing side channel remotely
    # (the advisory itself notes local, non-adversarial use is safe).
    { id = "RUSTSEC-2023-0071", reason = "rsa Marvin attack: no upstream fix; server-side JWT signing only, not exposed to local timing observation" },
    # Unmaintained transitive proc-macro dep (no vulnerability); pulled by derive macros and
    # cannot be replaced from a leaf crate.
    { id = "RUSTSEC-2024-0370", reason = "proc-macro-error unmaintained: transitive derive-macro dependency, no vulnerability" },
    # `idna` arrives via `validator`'s email/URL checks. The punycode edge case does not affect
    # our use (format validation of user-supplied emails); a fixed idna needs a validator bump
    # that isn't available on this line yet.
    { id = "RUSTSEC-2024-0421", reason = "idna punycode edge case via validator email checks; no validator release on this line pulls the fixed idna" },
    # Unmaintained (folded into rustls-pki-types); transitive via the rustls TLS stack.
    { id = "RUSTSEC-2025-0134", reason = "rustls-pemfile unmaintained: transitive via the rustls TLS stack, no vulnerability" },
    # Freshly-disclosed rustls-webpki cert-validation advisories with no patched release yet;
    # reachable only when validating a malicious X.509 certificate. TLS here targets internal
    # services (Postgres / OTLP collector) inside the cluster boundary. Revisit and drop these
    # once a fixed `rustls-webpki` ships.
    { id = "RUSTSEC-2026-0049", reason = "rustls-webpki CRL authority matching: no fixed release yet; internal-only TLS" },
    { id = "RUSTSEC-2026-0098", reason = "rustls-webpki URI name constraints: no fixed release yet; internal-only TLS" },
    { id = "RUSTSEC-2026-0099", reason = "rustls-webpki wildcard name constraints: no fixed release yet; internal-only TLS" },
    { id = "RUSTSEC-2026-0104", reason = "rustls-webpki CRL parsing panic: no fixed release yet; internal-only TLS" },
]

# ---------------------------------------------------------------------------
# Licenses — allowlist. The tree is pure-Rust with permissive licensing.
# ---------------------------------------------------------------------------
[licenses]
version = 2
# SPDX identifiers we accept without review.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    # Weak (file-level) copyleft — imposes no obligation on our own source when used as a
    # dependency. Historically pulled by `webpki-roots`.
    "MPL-2.0",
    # Permissive; transitive `foldhash` (a `hashbrown` dependency).
    "Zlib",
    # Permissive data license; current `webpki-roots` (TLS trust anchors) uses it.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.9
# Per-crate license clarifications (e.g. ring's multi-license file) go here.
[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# ---------------------------------------------------------------------------
# Bans — dependency hygiene. Duplicate versions are a warning, not a failure,
# so the tree can converge gradually rather than blocking on transitive dupes.
# ---------------------------------------------------------------------------
[bans]
multiple-versions = "warn"
wildcards = "deny"
# Our internal workspace crates are path dependencies (no semver version), which register as
# wildcards; that's expected and safe for in-tree crates. Third-party `*` deps remain denied.
allow-wildcard-paths = true
highlight = "all"
# Prefer the workspace to declare features rather than enabling them by default.
workspace-default-features = "allow"
external-default-features = "allow"
# Crates we never want pulled in (native TLS / C-linked stacks — this repo is pure Rust).
deny = [
    { name = "openssl-sys", reason = "pure-Rust TLS only (rustls); no OpenSSL/native-tls" },
    { name = "native-tls", reason = "use rustls" },
]
# Known-benign duplicate roots can be skipped explicitly here as they arise.
skip = []
skip-tree = []

# ---------------------------------------------------------------------------
# Sources — only crates.io and our own git remotes are trusted.
# ---------------------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
