name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Build against the committed offline query cache; no DB needed for fmt/clippy/deny.
  SQLX_OFFLINE: "true"

jobs:
  # --------------------------------------------------------------------------
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # --------------------------------------------------------------------------
  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: build
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # --------------------------------------------------------------------------
  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources

  # --------------------------------------------------------------------------
  test:
    name: test (unit + integration)
    runs-on: ubuntu-latest
    needs: [fmt, clippy]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          # First DB; the extra bounded-context DBs are created in a step below.
          POSTGRES_DB: identity_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redpanda:
        image: redpandadata/redpanda:v24.2.7
        ports:
          - 9092:9092
        options: >-
          --health-cmd "rpk cluster health -X brokers=localhost:9092 | grep -q 'Healthy:.*true'"
          --health-interval 15s
          --health-timeout 5s
          --health-retries 10

    env:
      # APP__ config overrides consumed by the services under test.
      APP__DATABASE__URL: postgres://app:app@localhost:5432/ledger_db
      APP__DATABASE__MAX_CONNECTIONS: "20"
      APP__REDIS__URL: redis://localhost:6379
      APP__KAFKA__BROKERS: localhost:9092
      APP__LOG__LEVEL: info
      APP__LOG__FORMAT: json
      # sqlx CLI reads this.
      DATABASE_URL: postgres://app:app@localhost:5432/ledger_db

    steps:
      - uses: actions/checkout@v7

      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: build

      # Create the remaining bounded-context databases (identity_db already exists).
      - name: Create databases
        env:
          PGPASSWORD: app
        run: |
          for db in ledger_db worker_db; do
            psql -h localhost -U app -d postgres -tc \
              "SELECT 1 FROM pg_database WHERE datname = '${db}'" | grep -q 1 \
              || psql -h localhost -U app -d postgres -c "CREATE DATABASE ${db}"
          done

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --version ^0.7 --no-default-features --features rustls,postgres --locked

      - name: Run migrations
        run: |
          for db in identity_db ledger_db worker_db; do
            if [ -d "migrations/${db}" ]; then
              sqlx migrate run \
                --source "migrations/${db}" \
                --database-url "postgres://app:app@localhost:5432/${db}"
            fi
          done

      - name: Test workspace
        # Live services are up, so exercise the online path too.
        env:
          SQLX_OFFLINE: "false"
        run: cargo test --workspace --all-features --no-fail-fast

  # --------------------------------------------------------------------------
  coverage:
    name: coverage (llvm-cov)
    runs-on: ubuntu-latest
    needs: [test]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: identity_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redpanda:
        image: redpandadata/redpanda:v24.2.7
        ports:
          - 9092:9092
        options: >-
          --health-cmd "rpk cluster health -X brokers=localhost:9092 | grep -q 'Healthy:.*true'"
          --health-interval 15s
          --health-timeout 5s
          --health-retries 10

    env:
      APP__DATABASE__URL: postgres://app:app@localhost:5432/ledger_db
      APP__REDIS__URL: redis://localhost:6379
      APP__KAFKA__BROKERS: localhost:9092
      DATABASE_URL: postgres://app:app@localhost:5432/ledger_db
      SQLX_OFFLINE: "false"

    steps:
      - uses: actions/checkout@v7
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: coverage
      - uses: taiki-e/install-action@cargo-llvm-cov

      - name: Create databases
        env:
          PGPASSWORD: app
        run: |
          for db in ledger_db worker_db; do
            psql -h localhost -U app -d postgres -tc \
              "SELECT 1 FROM pg_database WHERE datname = '${db}'" | grep -q 1 \
              || psql -h localhost -U app -d postgres -c "CREATE DATABASE ${db}"
          done

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --version ^0.7 --no-default-features --features rustls,postgres --locked

      - name: Run migrations
        run: |
          for db in identity_db ledger_db worker_db; do
            if [ -d "migrations/${db}" ]; then
              sqlx migrate run --source "migrations/${db}" \
                --database-url "postgres://app:app@localhost:5432/${db}"
            fi
          done

      - name: Collect coverage (lcov)
        run: cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info
          if-no-files-found: error
