version: 2
updates:
  # Rust / Cargo workspace dependencies.
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    groups:
      # Batch low-risk patch/minor bumps into a single PR to cut noise.
      cargo-minor:
        update-types: ["minor", "patch"]

  # GitHub Actions used by the workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci(actions)"

  # Base images in the shared service Dockerfile.
  - package-ecosystem: docker
    directory: "/deploy/docker"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(docker)"
