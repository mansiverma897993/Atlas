# =============================================================================
# EXAMPLE Secret — DOCUMENTED PLACEHOLDERS ONLY. NEVER commit real secrets.
#
# In production, do NOT apply this file directly. Instead manage the `ledger-secrets`
# Secret with SOPS / sealed-secrets / an external secrets operator (docs §6.3).
# This file exists to document the KEYS every service expects.
#
# `stringData` lets you write plaintext placeholders (k8s base64-encodes them).
# Each *_DB URL embeds the least-privilege `app` role + its password.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: ledger-secrets
  namespace: ledger
type: Opaque
stringData:
  # --- Per-context database URLs (host = managed instance in prod) ------------
  # identity service
  APP__DATABASE__URL__identity: "postgres://app:CHANGE_ME@postgres:5432/identity_db"
  # ledger service
  APP__DATABASE__URL__ledger: "postgres://app:CHANGE_ME@postgres:5432/ledger_db"
  # worker service
  APP__DATABASE__URL__worker: "postgres://app:CHANGE_ME@postgres:5432/worker_db"

  # --- Redis (if password-protected in prod) ---------------------------------
  APP__REDIS__PASSWORD: "CHANGE_ME"

  # --- JWT RS256 signing keypair (identity signs; others verify via JWKS) -----
  # PEM contents; keep the private key ONLY where tokens are minted.
  APP__JWT__PRIVATE_KEY_PEM: "-----BEGIN PRIVATE KEY-----\nCHANGE_ME\n-----END PRIVATE KEY-----"
  APP__JWT__PUBLIC_KEY_PEM: "-----BEGIN PUBLIC KEY-----\nCHANGE_ME\n-----END PUBLIC KEY-----"

  # --- OAuth2 provider (single external provider — ADR-0009) ------------------
  APP__OAUTH__CLIENT_ID: "CHANGE_ME"
  APP__OAUTH__CLIENT_SECRET: "CHANGE_ME"
